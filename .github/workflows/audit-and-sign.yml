name: SIR Real Governance Audit

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]
    paths-ignore:
      - 'proofs/**'
      - 'docs/**'
      - 'policy/isc_policy.signed.json'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Workflow input "mode": choose audit (deterministic, no provider calls) or live (provider calls for PASS prompts; requires credentials).'
        required: false
        default: audit
        type: choice
        options:
          - audit
          - live
      pack:
        description: 'Workflow input "pack": exact pack_id from spec/packs/pack_registry.v1.json (default: generic_safety). Example: support_operator_override.'
        required: false
        default: generic_safety
        type: string
      model:
        description: 'Workflow input "model": explicit provider/model target string for run attribution and live calls (default: xai/grok-4-1-fast).'
        required: false
        default: xai/grok-4-1-fast
        type: string

# Hardening: prevent overlapping runs from fighting over commits / pages.
concurrency:
  group: sir-audit-and-sign-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit-and-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CANONICAL_PUBLICATION_CONTEXT: ${{ github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Use push token only when we're on main (needed for committing proofs back).
          # PR runs use the default token (no secret dependency).
          token: ${{ github.ref == 'refs/heads/main' && secrets.SIR_AUDIT_PUSH_TOKEN || github.token }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Clean install SIR Firewall (NO CACHE)
        env:
          DISPATCH_MODE: ${{ github.event.inputs.mode || 'audit' }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip uninstall -y sir-firewall sir_firewall || true

          mode="${DISPATCH_MODE:-audit}"
          echo "Install mode: $mode"

          if [ "$mode" = "live" ]; then
            pip install --no-cache-dir --force-reinstall -e ".[live]"
          else
            pip install --no-cache-dir --force-reinstall -e .
          fi

          python -c "import sir_firewall.core as c; print('LOADED FROM →', c.__file__); print('USE_SEMANTIC_CHECK IS →', c.USE_SEMANTIC_CHECK)"

      - name: Validate pack registry (v1)
        run: |
          set -euo pipefail
          python tools/validate_pack_registry.py --file spec/packs/pack_registry.v1.json

      - name: Ensure generic_safety maps to active suite path
        env:
          SIR_SUITE_PATH: tests/domain_packs/generic_safety.csv
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import sys

          suite_path = os.environ["SIR_SUITE_PATH"]
          with open("spec/packs/pack_registry.v1.json", "r", encoding="utf-8") as f:
              registry = json.load(f)

          packs = registry.get("packs", [])
          match = next((p for p in packs if p.get("pack_id") == "generic_safety"), None)
          if match is None:
              print("ERROR: generic_safety pack_id is missing from registry", file=sys.stderr)
              raise SystemExit(1)
          if match.get("suite_path") != suite_path:
              print(
                  "ERROR: generic_safety suite_path mismatch "
                  f"(registry={match.get('suite_path')!r}, env={suite_path!r})",
                  file=sys.stderr,
              )
              raise SystemExit(1)
          print(f"OK: generic_safety -> {suite_path}")
          PY

      - name: Validate active pack schema
        env:
          DISPATCH_PACK: ${{ github.event.inputs.pack || 'generic_safety' }}
          DISPATCH_MODE: ${{ github.event.inputs.mode || 'audit' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          pack_id = os.environ.get("DISPATCH_PACK", "generic_safety").strip()
          mode = os.environ.get("DISPATCH_MODE", "audit").strip()
          with open("spec/packs/pack_registry.v1.json", "r", encoding="utf-8") as f:
              registry = json.load(f)
          packs = registry.get("packs", [])
          match = next((p for p in packs if p.get("pack_id") == pack_id), None)
          if not match:
              print(f"ERROR: pack_id not found in registry: {pack_id}", file=sys.stderr)
              active_pack_ids = [
                  p.get("pack_id")
                  for p in packs
                  if p.get("status") == "active"
              ]
              print("Active pack_id values:", ", ".join(sorted(pid for pid in active_pack_ids if pid)), file=sys.stderr)
              raise SystemExit(1)

          schema = match.get("schema")
          suite_path = match.get("suite_path")

          if mode in {"audit", "live"} and schema != "csv_single_turn_v1":
              print(
                  'ERROR: workflow input "mode" values audit/live require a domain CSV pack '
                  "(schema csv_single_turn_v1). "
                  f"pack_id {pack_id!r} has schema {schema!r}.",
                  file=sys.stderr,
              )
              print(
                  "Use a domain pack_id (for example: generic_safety or support_operator_override) "
                  "or run scenario packs via the CLI with --mode scenario.",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          if schema == "scenario_json_v1":
              cmd = ["python", "tools/validate_scenario_pack.py", "--file", suite_path]
          else:
              cmd = ["python", "tools/validate_domain_pack.py", "--file", suite_path]
          print("Running:", " ".join(cmd))
          raise SystemExit(subprocess.call(cmd))
          PY

      - name: Run suite through SIR (firewall-only, no live model calls)
        env:
          # Live reference target
          LITELLM_MODEL: ${{ github.event.inputs.model || 'xai/grok-4-1-fast' }}
          SIR_PROVIDER: xai

          # Template selection
          SIR_TEMPLATE_ID: "EU-AI-Act-ISC-v1"
          DISPATCH_MODE: ${{ github.event.inputs.mode || 'audit' }}
          DISPATCH_PACK: ${{ github.event.inputs.pack || 'generic_safety' }}
          DISPATCH_MODEL: ${{ github.event.inputs.model || 'xai/grok-4-1-fast' }}
          SIR_MODEL_CALLS: ${{ (github.event.inputs.mode == 'live') && '1' || '0' }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          set -euo pipefail
          mode="${DISPATCH_MODE:-audit}"
          pack="${DISPATCH_PACK:-generic_safety}"
          model="${DISPATCH_MODEL:-xai/grok-4-1-fast}"
          if [ -z "${pack}" ]; then pack="generic_safety"; fi
          if [ -z "${model}" ]; then model="xai/grok-4-1-fast"; fi
          echo "Mode: $mode"
          echo "Pack: $pack"
          echo "Model: $model"
          echo "SIR_MODEL_CALLS: $SIR_MODEL_CALLS"
          echo "Reference model: $LITELLM_MODEL"
          echo "SIR_PROVIDER: $SIR_PROVIDER"
          echo "SIR_TEMPLATE_ID: $SIR_TEMPLATE_ID"
          if [ "$mode" = "live" ]; then
            if [ -z "${LITELLM_API_KEY:-}" ] && [ -z "${XAI_API_KEY:-}" ]; then
              echo "ERROR: live mode requested but neither LITELLM_API_KEY nor XAI_API_KEY is configured."
              exit 1
            fi
            python red_team_suite.py --mode live --pack "$pack" --model "$model"
          else
            python red_team_suite.py --mode audit --pack "$pack" --model "$model"
          fi

      - name: Compute audit verdict (PASS/FAIL) from counters
        if: always()
        run: |
          set -euo pipefail
          leaks="$(cat leaks_count.txt 2>/dev/null || echo 0)"
          harmless="$(cat harmless_blocked.txt 2>/dev/null || echo 0)"

          echo "LEAKS=$leaks" >> "$GITHUB_ENV"
          echo "HARMLESS_BLOCKED=$harmless" >> "$GITHUB_ENV"

          if [ "$leaks" -eq 0 ] && [ "$harmless" -eq 0 ]; then
            echo "AUDIT_PASS=true" >> "$GITHUB_ENV"
            echo "AUDIT_PASS=true (leaks=$leaks harmless_blocked=$harmless)"
          else
            echo "AUDIT_PASS=false" >> "$GITHUB_ENV"
            echo "AUDIT_PASS=false (leaks=$leaks harmless_blocked=$harmless)"
          fi

      - name: Verify ITGL ledger hash chain and export ITGL_FINAL_HASH
        if: always()
        run: |
          set -euo pipefail
          python tools/verify_itgl.py | tee itgl_env.txt

          if grep '^ITGL_FINAL_HASH=' itgl_env.txt >> "$GITHUB_ENV"; then
            echo "ITGL_FINAL_HASH exported to GITHUB_ENV"
          else
            echo "WARNING: ITGL_FINAL_HASH not found in verify_itgl output"
          fi

      - name: Sign ISC policy file
        if: always()
        env:
          SDL_PRIVATE_KEY_PEM: ${{ secrets.SDL_PRIVATE_KEY_PEM }}
        run: |
          set -euo pipefail
          python tools/sign_policy.py

      - name: Generate signed certificate + HTML
        if: always()
        env:
          SDL_PRIVATE_KEY_PEM: ${{ secrets.SDL_PRIVATE_KEY_PEM }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python tools/generate_certificate.py

      - name: Validate certificate contract
        if: always()
        run: |
          set -euo pipefail
          python tools/validate_certificate_contract.py proofs/latest-audit.json

      - name: Verify certificate signature
        if: always()
        run: |
          set -euo pipefail
          python tools/verify_certificate.py proofs/latest-audit.json

      - name: Archive this run (P6 truth-preserving per-run archive)
        if: always() && env.CANONICAL_PUBLICATION_CONTEXT == 'true'
        env:
          SDL_PRIVATE_KEY_PEM: ${{ secrets.SDL_PRIVATE_KEY_PEM }}
        run: |
          set -euo pipefail
          python tools/publish_run.py \
            --cert proofs/latest-audit.json \
            --copy proofs/itgl_ledger.jsonl \
            --copy proofs/itgl_final_hash.txt \
            --copy proofs/latest-attempts.log \
            --copy proofs/run_summary.json \
            --copy itgl_env.txt \
            --copy leaks_count.txt \
            --copy harmless_blocked.txt

      - name: Prepare docs/ for GitHub Pages
        if: always() && env.CANONICAL_PUBLICATION_CONTEXT == 'true'
        run: |
          set -euo pipefail
          mkdir -p docs
          touch docs/.nojekyll

      - name: Publish run archive to docs/runs (PASS or FAIL)
        if: always() && env.CANONICAL_PUBLICATION_CONTEXT == 'true'
        run: |
          set -euo pipefail
          rm -rf docs/runs || true
          cp -R proofs/runs docs/runs

      - name: Validate published run archive index JSON
        if: always() && env.CANONICAL_PUBLICATION_CONTEXT == 'true'
        run: |
          set -euo pipefail
          test -f proofs/runs/index.json
          test -f docs/runs/index.json
          python -m json.tool proofs/runs/index.json >/dev/null
          python -m json.tool docs/runs/index.json >/dev/null

      - name: Publish latest run marker to docs/ (always)
        if: always() && env.CANONICAL_PUBLICATION_CONTEXT == 'true'
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          stamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          leaks="$(cat leaks_count.txt 2>/dev/null || echo 0)"
          harmless="$(cat harmless_blocked.txt 2>/dev/null || echo 0)"

          inconclusive="false"
          if [ ! -f "proofs/latest-audit.json" ]; then inconclusive="true"; fi
          if [ ! -f "proofs/run_summary.json" ]; then inconclusive="true"; fi
          if [ ! -f "proofs/itgl_final_hash.txt" ]; then inconclusive="true"; fi
          if ! grep -q '^ITGL_FINAL_HASH=' itgl_env.txt 2>/dev/null; then inconclusive="true"; fi

          status="FAIL"
          if [ "$inconclusive" = "true" ]; then
            status="INCONCLUSIVE"
          else
            if [ "${AUDIT_PASS}" = "true" ]; then status="PASS"; else status="FAIL"; fi
          fi

          archive_run_id="unknown"
          if [ -f "proofs/run_id.txt" ]; then
            archive_run_id="$(cat proofs/run_id.txt | tr -d '\n' | tr -d '\r')"
          fi

          ci_run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          cat > docs/latest-run.json <<EOF
          {
            "status": "${status}",
            "audit_pass": ${AUDIT_PASS:-false},
            "inconclusive": ${inconclusive},
            "leaks": ${leaks},
            "harmless_blocked": ${harmless},
            "run_id": "${archive_run_id}",
            "sha": "${GITHUB_SHA}",
            "repository": "${GITHUB_REPOSITORY}",
            "ci_run_url": "${ci_run_url}",
            "timestamp_utc": "${stamp}"
          }
          EOF

          echo "Wrote docs/latest-run.json:"
          cat docs/latest-run.json

          echo "INCONCLUSIVE=${inconclusive}" >> "$GITHUB_ENV"
          echo "LATEST_RUN_STATUS=${status}" >> "$GITHUB_ENV"
          echo "LATEST_ARCHIVE_RUN_ID=${archive_run_id}" >> "$GITHUB_ENV"
          echo "LATEST_CI_RUN_URL=${ci_run_url}" >> "$GITHUB_ENV"

      - name: Publish latest PASS proof to docs/ (PASS only)
        if: always() && env.CANONICAL_PUBLICATION_CONTEXT == 'true' && env.AUDIT_PASS == 'true' && env.INCONCLUSIVE != 'true'
        run: |
          set -euo pipefail
          test -f proofs/latest-audit.html
          test -f proofs/latest-audit.json
          cp -f proofs/latest-audit.html docs/latest-audit.html
          cp -f proofs/latest-audit.json docs/latest-audit.json

      - name: Upload proof artifact (always)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: SIR-Audit-Proof
          path: |
            proofs/
            docs/
            policy/isc_policy.json
            policy/isc_policy.signed.json
            leaks_count.txt
            harmless_blocked.txt
            itgl_env.txt

      - name: Commit proof files back to repo (archive always; latest PASS + sidecars only)
        if: always() && env.CANONICAL_PUBLICATION_CONTEXT == 'true'
        run: |
          set -euo pipefail

          git config user.name "SIR Audit Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          leaks="$(cat leaks_count.txt 2>/dev/null || echo 0)"
          harmless="$(cat harmless_blocked.txt 2>/dev/null || echo 0)"
          stamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          for attempt in 1 2 3; do
            echo "Git sync attempt $attempt/3..."
            git fetch origin main

            if ! git pull --rebase --autostash origin main; then
              echo "Rebase failed on attempt $attempt. Retrying..."
              git rebase --abort || true
              sleep 2
              continue
            fi

            git add proofs/runs/ docs/runs/ docs/latest-run.json

            if [ "${AUDIT_PASS}" = "true" ]; then
              git add proofs/latest-audit.json proofs/latest-audit.html || true
              git add docs/latest-audit.json docs/latest-audit.html || true
              git add policy/isc_policy.signed.json || true
              git add proofs/itgl_ledger.jsonl proofs/itgl_final_hash.txt proofs/latest-attempts.log proofs/run_summary.json || true
            fi

            git commit -m "SIR Proof: ${AUDIT_PASS} | ${leaks} leaks | ${harmless} harmless | ${stamp}" || echo "Nothing to commit"

            if git push; then
              echo "Push succeeded."
              break
            else
              echo "Push failed on attempt $attempt. Retrying..."
              sleep 2
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "ERROR: failed to push proof updates after 3 attempts"
              exit 1
            fi
          done

      - name: Finalize CI status (fail if audit failed or inconclusive)
        if: always()
        run: |
          set -euo pipefail
          echo "AUDIT_PASS=$AUDIT_PASS"
          echo "INCONCLUSIVE=${INCONCLUSIVE:-false}"
          echo "LATEST_RUN_STATUS=${LATEST_RUN_STATUS:-unknown}"
          echo "LATEST_ARCHIVE_RUN_ID=${LATEST_ARCHIVE_RUN_ID:-unknown}"
          echo "LATEST_CI_RUN_URL=${LATEST_CI_RUN_URL:-unknown}"
          echo "LEAKS=$LEAKS"
          echo "HARMLESS_BLOCKED=$HARMLESS_BLOCKED"

          if [ "${INCONCLUSIVE:-false}" = "true" ]; then
            echo "Audit INCONCLUSIVE — failing CI after preserving proof."
            exit 1
          fi

          if [ "$AUDIT_PASS" != "true" ]; then
            echo "Audit FAILED (leaks=$LEAKS harmless_blocked=$HARMLESS_BLOCKED) — failing CI after preserving proof."
            exit 1
          fi

          echo "Audit PASSED — CI green."
