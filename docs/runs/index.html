<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SIR Firewall — Run Archive</title>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif; max-width: 980px; margin: 34px auto; padding: 0 16px; line-height: 1.4; color: #1f2328; }
    h1 { margin: 0 0 6px; font-size: 1.45rem; }
    .muted { color: #57606a; margin: 0 0 16px; font-size: 0.95rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.93rem; }
    th, td { text-align: left; padding: 8px 7px; border-bottom: 1px solid #d8dee4; vertical-align: top; }
    th { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #57606a; }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { font-family: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,Liberation Mono,monospace; font-size: 12px; }
    .pill { display: inline-block; padding: 1px 7px; border-radius: 999px; font-size: 11px; border: 1px solid #d0d7de; color: #57606a; }
  </style>
</head>
<body>
  <h1>SIR Firewall — Evidence Archive</h1>
  <p class="muted">
    Immutable per-run records for the governance gate. Latest pointer: <a href="../latest-audit.html">proofs/latest-audit.html</a>.
    Machine indexes: <a href="index.json">runs/index.json</a> and <a href="benchmark_index.v1.json">runs/benchmark_index.v1.json</a>.
  </p>

  <table aria-label="Run archive evidence table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Suite</th>
        <th>Proof class</th>
        <th>Result</th>
        <th>Leaks</th>
        <th>Fingerprint</th>
        <th>Run ID</th>
        <th>CI</th>
      </tr>
    </thead>
    <tbody id="rows">
      <tr><td colspan="8">Loading…</td></tr>
    </tbody>
  </table>

  <script>
    const rows = document.getElementById("rows");

    function esc(s) {
      return (s ?? "").toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function ciLabelAndLink(ciUrl) {
      if (!ciUrl) return { html: '<span class="pill">OFFLINE</span>' };

      const u = ciUrl.toString();
      const tail = (u.split("/").pop() || "").trim();
      const isDigits = /^[0-9]+$/.test(tail);

      if (isDigits) {
        return { html: `<a href="${esc(u)}">#${esc(tail)}</a>` };
      }

      if (tail.toUpperCase() === "LOCAL" || u.toUpperCase().includes("/RUNS/LOCAL")) {
        return { html: '<span class="pill">LOCAL</span>' };
      }

      return { html: `<a href="${esc(u)}">CI</a>` };
    }

    async function loadRuns() {
      try {
        const response = await fetch("./index.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status} ${response.statusText || ""}`.trim());
        }

        let idx;
        try {
          idx = await response.json();
        } catch (e) {
          throw new Error(`HTTP ${response.status}: JSON parse error (${e?.message || "invalid JSON"})`);
        }

        const runs = Array.isArray(idx) ? idx : (Array.isArray(idx?.runs) ? idx.runs : []);
        if (!runs.length) {
          rows.innerHTML = `<tr><td colspan="8">No archived runs yet.</td></tr>`;
          return;
        }

        rows.innerHTML = runs.map(r => {
          const date = esc(r.date ?? r.timestamp_utc ?? "—");
          const result = esc(r.result ?? "—");
          const suite = esc(r.pack_id ?? "—");
          const proofClass = esc(r.proof_class ?? "—");
          const leaks = esc(r.leaks ?? r.jailbreaks_leaked ?? "—");
          const fp = esc((r.trust_fingerprint ?? r.safety_fingerprint ?? "—").toString().slice(0, 20));
          const path = esc(r.path ?? "");
          const runId = esc(r.run_id ?? "");
          const ci = ciLabelAndLink(r.ci_run_url ?? "").html;

          const runLink = path
            ? `<a href="../${path}manifest.json"><code>${runId}</code></a>`
            : `<code>${runId}</code>`;

          return `<tr>
            <td>${date}</td>
            <td><code>${suite}</code></td>
            <td><code>${proofClass}</code></td>
            <td><span class="pill">${result}</span></td>
            <td>${leaks}</td>
            <td><code>${fp}</code></td>
            <td>${runLink}</td>
            <td>${ci}</td>
          </tr>`;
        }).join("");
      } catch (e) {
        const reason = esc(e?.message || "Unknown error");
        rows.innerHTML = `<tr><td colspan="8">Failed to load index.json (${reason})</td></tr>`;
      }
    }

    loadRuns();
  </script>
</body>
</html>
